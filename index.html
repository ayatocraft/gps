<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GPSナビ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
}

#map {
  width: 100%;
  height: 100vh;
}

/* UI（回転の影響受けない） /
#ui {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
}

button {
  padding: 18px 22px;
  font-size: 18px;
  border-radius: 50%;
  border: none;
  background: #0a84ff;
  color: white;
}

/ 速度 /
#speed {
  position: fixed;
  bottom: 20px;
  left: 20px;
  font-size: 28px;
  font-weight: bold;
  color: white;
  z-index: 9999;
}

/ 三角マーカー */
.triangle {
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-bottom: 28px solid #0a84ff;
  transform-origin: center;
}
</style>
</head>
<body>

<div id="map"></div>

<div id="ui">
  <button onclick="goCenter()">📍</button>
</div>

<div id="speed">0 km/h</div>

<script>
// ===== 地図 =====
let map = L.map('map', { zoomControl: false }).setView([0,0], 17);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ===== マーカー =====
let marker = L.marker([0,0], {
  icon: L.divIcon({
    html: '<div class="triangle"></div>',
    className: '',
    iconSize: [28,28],
    iconAnchor: [14,14]
  })
}).addTo(map);

// ===== ルート =====
let latlngs = [];
let polyline = L.polyline(latlngs, {
  color: 'cyan',
  weight: 5
}).addTo(map);

// ===== 状態 =====
let currentHeading = 0;
let lastLatLng = null;

// ===== 現在地ボタン =====
function goCenter() {
  if (lastLatLng) {
    map.setView(lastLatLng, 17);
  }
}

// ===== GPS自動開始 =====
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {

    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;
    lastLatLng = [lat, lng];

    // 位置更新
    marker.setLatLng([lat, lng]);
    map.setView([lat, lng]);

    // ルート
    latlngs.push([lat, lng]);
    polyline.setLatLngs(latlngs);

    // ===== 速度 =====
    let speed = pos.coords.speed || 0;
    let kmh = (speed * 3.6).toFixed(1);
    document.getElementById("speed").innerText = kmh + " km/h";

    // ===== 向き =====
    if (pos.coords.heading !== null && !isNaN(pos.coords.heading)) {
      currentHeading = pos.coords.heading;
    }

    // 三角回転
    let el = marker.getElement();
    if (el) {
      el.style.transform = "rotate(" + currentHeading + "deg)";
    }

    // ===== 地図回転（map-paneだけ回す）=====
    let pane = document.querySelector(".leaflet-map-pane");
    if (pane) {
      pane.style.transformOrigin = "center center";
      pane.style.transform = "rotate(" + (-currentHeading) + "deg)";
    }

  }, err => {
    alert("GPSエラー: " + err.message);
  }, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 5000
  });
} else {
  alert("GPS非対応");
}
</script>

</body>
</html>
