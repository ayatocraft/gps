<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GPSナビ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #000;
  overflow: hidden;
}

#map {
  width: 100%;
  height: 100vh;
}

/* デカボタンUI /
#ui {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  text-align: center;
}

button {
  padding: 18px 25px;
  margin: 8px;
  font-size: 18px;
  border-radius: 15px;
  border: none;
  background: #0a84ff;
  color: white;
}

/ 速度 /
#speed {
  font-size: 28px;
  font-weight: bold;
  margin-top: 10px;
  color: white;
}

/ 三角マーカー */
.triangle {
  width: 0;
  height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-bottom: 24px solid #0a84ff;
  transform-origin: center;
}
</style>
</head>
<body>

<div id="map"></div>

<div id="ui">
  <button onclick="startGPS()">開始</button>
  <button onclick="resetRoute()">リセット</button>
  <div id="speed">0 km/h</div>
</div>

<script>
let map = L.map('map', {
  zoomControl: false
}).setView([0,0], 17);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ''
}).addTo(map);

// ===== 三角マーカー =====
let triangleIcon = L.divIcon({
  className: '',
  html: '<div class="triangle"></div>',
  iconSize: [24, 24],
  iconAnchor: [12, 12]
});

let marker = L.marker([0,0], {
  icon: triangleIcon
}).addTo(map);

// ===== ルート =====
let latlngs = [];
let polyline = L.polyline(latlngs, {
  color: 'cyan',
  weight: 5
}).addTo(map);

// ===== 回転用 =====
let currentHeading = 0;

// ===== GPS =====
function startGPS() {
  navigator.geolocation.watchPosition(pos => {

    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    // 位置更新
    marker.setLatLng([lat, lng]);
    map.setView([lat, lng]);

    // ルート
    latlngs.push([lat, lng]);
    polyline.setLatLngs(latlngs);

    // ===== 速度 =====
    let speed = pos.coords.speed || 0;
    let kmh = (speed * 3.6).toFixed(1);
    document.getElementById("speed").innerText = kmh + " km/h";

    // ===== 進行方向（heading）=====
    if (pos.coords.heading !== null && !isNaN(pos.coords.heading)) {
      currentHeading = pos.coords.heading;
    }

    // 三角回転
    let el = marker.getElement();
    if (el) {
      el.style.transform = "rotate(" + currentHeading + "deg)";
    }

    // ===== 地図回転（疑似）=====
    let mapPane = document.querySelector(".leaflet-map-pane");
    if (mapPane) {
      mapPane.style.transformOrigin = "center center";
      mapPane.style.transform =
        "rotate(" + (-currentHeading) + "deg)";
    }

  }, err => {
    alert("GPSエラー: " + err.message);
  }, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 5000
  });
}

// ===== リセット =====
function resetRoute() {
  latlngs = [];
  polyline.setLatLngs([]);
}
</script>

</body>
</html>
